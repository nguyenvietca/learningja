<!DOCTYPE html>
<html lang="vi">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
	<link rel="icon" type="image/png" href="favicon.png">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<title>JLPT N2 Study Web App</title>
</head>

<body>
	<div class="container">
		<h1>📘 JLPT N2 Study Web App</h1>

		<!-- Book Select - hiện trên mọi thiết bị -->
		<select id="bookSelect">
			<option value="shinkanzen">Shinkanzen</option>
			<option value="soumatome">Soumatome</option>
		</select>

		<!-- ===== MOBILE TAB NAV (chỉ hiện trên mobile) ===== -->
		<ul class="nav nav-tabs nav-fill mobile-tab-nav" id="mobileTab" role="tablist">
			<li class="nav-item" role="presentation">
				<button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-flashcard" type="button">
					🧠 Flashcard
				</button>
			</li>
			<li class="nav-item" role="presentation">
				<button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-quiz" type="button">
					🎯 Quiz N2
				</button>
			</li>
			<li class="nav-item" role="presentation">
				<button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-exam" type="button">
					📝 Thi thử
				</button>
			</li>
		</ul>

		<!-- ===== NỘI DUNG CHÍNH: tab trên mobile, scroll trên desktop ===== -->
		<div class="tab-content main-content" id="mobileTabContent">

			<!-- Daily Checklist: chỉ desktop mới thấy -->
			<div class="card desktop-only-card">
				<h2>📅 Daily Study Checklist</h2>
				<div class="checkbox-list">
					<label><input type="checkbox"> 25 từ mới</label>
					<label><input type="checkbox"> 15 từ ôn</label>
					<label><input type="checkbox"> 5 câu dài phân tích</label>
					<label><input type="checkbox"> 1 đoạn đọc ngắn</label>
					<label><input type="checkbox"> Ôn nhanh cuối buổi</label>
				</div>
				<div id="progressBar"></div>
			</div>

			<!-- Tab Flashcard -->
			<div class="tab-pane fade show active" id="tab-flashcard">
				<div class="card">
					<h2>🧠 Flashcard N2 (200 từ)</h2>
					<div class="small" id="counter"></div>
					<select id="flashRangeSelect"></select>
					<div class="flashcard" id="flashcard"></div>
					<div>
						<span class="small" id="kana"></span>
						<span class="small" id="meaning" style="display:none;"></span>
						<div class="small" id="example"></div>
					</div>
					<div class="btn-row">
						<button class="success" onclick="nextCard(1)">◀ Trước</button>
						<button class="primary" id="toggleBtn" onclick="toggleMeaning()">Hiện nghĩa</button>
						<button class="success" onclick="nextCard(0)">Tiếp ▶</button>
					</div>
					<label class="autospeak-label">
						<input type="checkbox" id="autoSpeakToggle" checked> 🔊 Phát âm tự động
					</label>
				</div>
			</div>

			<!-- Tab Quiz -->
			<div class="tab-pane fade" id="tab-quiz">
				<div class="card">
					<h2>🎯 Quiz N2</h2>
					<select id="quizRangeSelect"></select>
					<div id="quizQuestion" style="font-size:22px; margin-bottom:10px;"></div>
					<div id="quizOptions"></div>
					<div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; min-height:30px;">
						<div class="small" id="quizScore"></div>
						<button onclick="resetScore()"
							style="font-size:12px; padding:4px 10px; background:#e74c3c; color:white; border-radius:20px; margin-top:0;">🔄
							Reset</button>
						<div class="small" id="quizAnswer"></div>
					</div>
					<button class="success btn-full" onclick="nextQuiz()">Câu tiếp theo</button>
				</div>
			</div>

			<!-- Roadmap: chỉ desktop -->
			<div class="card desktop-only-card">
				<h2>📆 Lộ trình 6 tháng (24 tuần)</h2>
				<div id="roadmap"></div>
			</div>

			<!-- Tab Thi thử -->
			<div class="tab-pane fade" id="tab-exam">
				<div class="card">
					<h2>📝 Thi thử N2 (30 câu)</h2>
					<div class="exam-controls">
						<select id="examRangeSelect"></select>
						<label style="font-size:14px; cursor:pointer;">
							<input type="checkbox" id="randomExamToggle"> 🎲 Random toàn bộ
						</label>
					</div>
					<div id="examQuestion"></div>
					<div id="examOptions" style="display: grid;"></div>
					<div id="examResult"></div>
					<button class="primary btn-full" onclick="startExam()">Bắt đầu thi</button>
				</div>
			</div>

			<!-- Quy tắc vàng: chỉ desktop -->
			<div class="card desktop-only-card">
				<h2>📖 Quy tắc vàng đọc N2</h2>
				<ul>
					<li>Nếu có <b>が</b> → Ý chính thường nằm phía sau</li>
					<li>Tìm động từ chính ở cuối câu</li>
					<li>Không dịch từng chữ – chia mệnh đề</li>
				</ul>
			</div>

		</div><!-- end tab-content -->
	</div>
	<a href="https://www.facebook.com/nguyenvietca.nvca" target="_blank" class="facebook-float">
		<i class="bi bi-facebook"></i>
	</a>

	<script src="shinkanzenData.js"></script>
	<script src="somatomeData.js"></script>
	<script src="app.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
